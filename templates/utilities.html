<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilities — My Reading Alcove</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #d8d8d8; --card: #3a3a3a; --border: #4a4a4a; --accent: #3b9eff; --text: #f0ede8; --muted: #8a8795; --radius: 16px; --shadow: 0 6px 20px rgba(0,0,0,0.6); }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
    .brand { text-align: center; margin-bottom: 48px; }
    .brand h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 8vw, 3.2rem); color: var(--accent); letter-spacing: 0.04em; margin-bottom: 8px; }
    .brand p { color: var(--muted); font-size: 0.95rem; font-weight: 300; letter-spacing: 0.08em; text-transform: uppercase; }
    .menu { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 360px; }
    .menu-btn { display: block; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; text-align: center; text-decoration: none; color: var(--text); font-family: 'DM Serif Display', serif; font-size: 1.3rem; letter-spacing: 0.02em; transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s, background 0.15s; cursor: pointer; width: 100%; }
    .menu-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.7); border-color: var(--accent); background: #22222e; }
    .menu-btn:active { transform: translateY(1px); }
    .menu-btn .icon { display: block; font-size: 2rem; margin-bottom: 8px; }
    .menu-btn .sub { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; color: var(--muted); font-weight: 300; margin-top: 4px; letter-spacing: 0.04em; }
    .back-link { margin-top: 32px; color: var(--muted); font-size: 0.85rem; text-decoration: none; letter-spacing: 0.04em; transition: color 0.15s; }
    .back-link:hover { color: var(--accent); }
    .flash { width: 100%; max-width: 360px; padding: 12px 16px; border-radius: 10px; font-size: 0.9rem; margin-bottom: 20px; text-align: center; }
    .flash.success { background: #1a3a1a; border: 1px solid #3a7a3a; color: #7dcc7d; }
    .flash.error { background: #3a1a1a; border: 1px solid #7a3a3a; color: #cc7d7d; }
    .import-form { width: 100%; }
    .import-btn { position: relative; overflow: hidden; }
    .import-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="brand">
    <h1>Utilities</h1>
    <p>Import &amp; Export your library</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <nav class="menu">
    <a class="menu-btn" href="/utilities/export">
      <span class="icon">📤</span>
      Export CSV
      <span class="sub">Download your library as a spreadsheet</span>
    </a>
    <form class="import-form" action="/utilities/import" method="POST" enctype="multipart/form-data">
      <button type="button" class="menu-btn import-btn" onclick="this.querySelector('input[type=file]').click()">
        <span class="icon">📥</span>
        Import CSV
        <span class="sub">Upload a CSV file to add books</span>
        <input type="file" name="file" accept=".csv" onchange="this.closest('form').submit()">
      </button>
    </form>
  </nav>
  <a class="back-link" href="/">&#8592; Back to Home</a>
</body>
</html>
