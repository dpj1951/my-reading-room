<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit — {{ book.title }} — My Reading Alcove</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e12; --surface: #16161c; --card: #1c1c24; --border: #2a2a36;
      --accent: #3b9eff; --text: #f0ede8; --muted: #8a8795;
      --paper: #7ec8b5; --ebook: #7eaae8; --audio: #c87eb5; --radius: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(14,14,18,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 64px; }
    .nav-back { display: flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 0.875rem; transition: color 0.2s; }
    .nav-back:hover { color: var(--text); }
    .nav-back svg { width: 16px; height: 16px; }
    .nav-title { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--accent); }
    .page { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }
    h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; margin-bottom: 8px; }
    .sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 32px; }
    .form-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .form-section h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 20px; }
    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 0.775rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    input[type=text], input[type=date], input[type=number], textarea { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; width: 100%; }
    input:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 100px; line-height: 1.5; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
    .format-group { display: flex; gap: 8px; }
    .format-btn { flex: 1; padding: 10px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: center; }
    .format-btn:hover { border-color: var(--text); color: var(--text); }
    .format-btn.active-paper { border-color: var(--paper); color: var(--paper); background: rgba(126,200,181,0.1); }
    .format-btn.active-ebook { border-color: var(--ebook); color: var(--ebook); background: rgba(126,170,232,0.1); }
    .format-btn.active-audio { border-color: var(--audio); color: var(--audio); background: rgba(200,126,181,0.1); }
    .audio-field { display: none; }
    .audio-field.show { display: flex; }
    .star-group { display: flex; gap: 6px; align-items: center; }
    .star { font-size: 1.75rem; cursor: pointer; color: var(--border); transition: color 0.15s, transform 0.1s; line-height: 1; user-select: none; }
    .star:hover, .star.active { color: #f5c518; }
    .star:hover { transform: scale(1.15); }
    .star-label { font-size: 0.8rem; color: var(--muted); margin-left: 8px; }
    .btn-row { margin-top: 24px; display: flex; gap: 12px; }
    .btn-save { flex: 1; background: var(--accent); color: #0e0e12; border: none; border-radius: 8px; padding: 14px; font-family: 'DM Serif Display', serif; font-size: 1.05rem; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-save:hover { background: #f0d898; transform: translateY(-1px); }
    .btn-cancel { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 14px 24px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; text-decoration: none; display: flex; align-items: center; transition: border-color 0.2s, color 0.2s; }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    @media (max-width: 600px) {
      nav { padding: 0 16px; }
      .page { padding: 24px 16px 60px; }
      .fields { grid-template-columns: 1fr; }
      .field.full { grid-column: 1; }
      .btn-row { flex-direction: column-reverse; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-back" href="/book/{{ book.id }}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      Back
    </a>
    <span class="nav-title">Edit Book</span>
  </nav>

  <div class="page">
    <h1>Edit book</h1>
    <p class="sub">Update the details for <em>{{ book.title }}</em>.</p>

    <form class="form-section" action="/book/{{ book.id }}/edit" method="POST">
      <h2>Book details</h2>
      <div class="fields">

        <div class="field full">
          <label>Title *</label>
          <input type="text" name="title" required placeholder="Book title" value="{{ book.title }}">
        </div>

        <div class="field full">
          <label>Author *</label>
          <input type="text" name="author" required placeholder="Author name" value="{{ book.author }}">
        </div>

        <div class="field">
          <label>ISBN</label>
          <input type="text" name="isbn" placeholder="ISBN" value="{{ book.isbn or '' }}">
        </div>

        <div class="field">
          <label>Copyright Year</label>
          <input type="text" name="copyright_year" placeholder="e.g. 1984" value="{{ book.copyright_year or '' }}">
        </div>

        <div class="field">
          <label>Pages</label>
          <input type="text" name="pages" placeholder="e.g. 320" value="{{ book.pages or '' }}">
        </div>

        <div class="field">
          <label>Read Date</label>
          <input type="date" name="read_date" value="{{ book.read_date or today }}">
        </div>

        <div class="field full">
          <label>Format</label>
          <div class="format-group">
            <button type="button" id="btn-paper"
              class="format-btn {% if book.format == 'Paper' %}active-paper{% endif %}"
              onclick="setFormat('Paper')">📖 Paper</button>
            <button type="button" id="btn-ebook"
              class="format-btn {% if book.format == 'Ebook' %}active-ebook{% endif %}"
              onclick="setFormat('Ebook')">📱 Ebook</button>
            <button type="button" id="btn-audio"
              class="format-btn {% if book.format == 'Audiobook' %}active-audio{% endif %}"
              onclick="setFormat('Audiobook')">🎧 Audiobook</button>
          </div>
          <input type="hidden" name="format" id="f-format" value="{{ book.format or 'Paper' }}">
        </div>

        <div class="field full audio-field {% if book.format == 'Audiobook' %}show{% endif %}" id="audio-field">
          <label>Run Time (hours)</label>
          <input type="number" name="read_time_hrs" id="f-runtime" placeholder="e.g. 12.5" step="0.1" min="0"
            value="{{ book.read_time_hrs or '' }}">
        </div>

        <div class="field full">
          <label>Cover Image URL</label>
          <input type="text" name="cover_url" placeholder="https://…" value="{{ book.cover_url or '' }}">
        </div>

        <div class="field full">
          <label>Plot Summary</label>
          <textarea name="summary" placeholder="Brief description…">{{ book.summary or '' }}</textarea>
        </div>

        <div class="field full">
          <label>My Rating</label>
          <div class="star-group">
            {% for i in range(1, 6) %}
            <span class="star {% if book.rating and i <= book.rating|int %}active{% endif %}"
              data-val="{{ i }}" onclick="setRating({{ i }})" title="{{ i }} star{{ 's' if i > 1 else '' }}">★</span>
            {% endfor %}
            <span class="star-label" id="rating-label">
              {% if book.rating %}
                {{ book.rating }} / 5
              {% else %}
                No rating
              {% endif %}
            </span>
          </div>
          <input type="hidden" name="rating" id="f-rating" value="{{ book.rating or '' }}">
        </div>

      </div>

      <div class="btn-row">
        <a class="btn-cancel" href="/book/{{ book.id }}">Cancel</a>
        <button type="submit" class="btn-save">Save Changes</button>
      </div>
    </form>
  </div>

  <script>
    function setFormat(fmt) {
      document.getElementById('f-format').value = fmt;
      ['Paper', 'Ebook', 'Audiobook'].forEach(f => {
        const id = f === 'Audiobook' ? 'btn-audio' : 'btn-' + f.toLowerCase();
        const btn = document.getElementById(id);
        if (!btn) return;
        btn.className = 'format-btn';
        if (f === fmt) btn.classList.add(
          fmt === 'Paper' ? 'active-paper' : fmt === 'Ebook' ? 'active-ebook' : 'active-audio'
        );
      });
      document.getElementById('audio-field').className =
        'field full audio-field' + (fmt === 'Audiobook' ? ' show' : '');
    }

    const ratingLabels = ['', 'Poor', 'Fair', 'Good', 'Great', 'Excellent'];
    function setRating(val) {
      document.getElementById('f-rating').value = val;
      document.getElementById('rating-label').textContent = val + ' / 5 — ' + ratingLabels[val];
      document.querySelectorAll('.star').forEach(s => {
        s.classList.toggle('active', parseInt(s.dataset.val) <= val);
      });
    }

    document.querySelectorAll('.star').forEach(s => {
      s.addEventListener('mouseover', () => {
        const v = parseInt(s.dataset.val);
        document.querySelectorAll('.star').forEach(st => {
          st.style.color = parseInt(st.dataset.val) <= v ? '#f5c518' : '';
        });
      });
      s.addEventListener('mouseleave', () => {
        const cur = parseInt(document.getElementById('f-rating').value) || 0;
        document.querySelectorAll('.star').forEach(st => {
          st.style.color = parseInt(st.dataset.val) <= cur ? '#f5c518' : '';
        });
      });
    });
  </script>
</body>
</html>
